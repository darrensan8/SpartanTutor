<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment - SJSU Tutoring</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: white; }
        .header h1 { font-size: 1.5rem; font-weight: normal; }
        .main { background: #707070; min-height: 80vh; padding: 32px; }
        .main h2 { color: #E5A823; font-size: 1.5rem; margin-bottom: 24px; font-weight: bold; }
        .cards { display: flex; gap: 24px; }
        .card { background: white; padding: 24px; flex: 1; }
        .card h3 { border-bottom: 2px solid #999; padding-bottom: 8px; margin-bottom: 16px; font-weight: normal; font-size: 1.1rem; }
        .card p { margin-bottom: 12px; font-size: 1rem; }
        label { display: block; margin-bottom: 4px; font-size: 0.95rem; }
        input[type="text"] { width: 100%; padding: 8px; background: #e0e0e0; border: none; margin-bottom: 14px; font-size: 1rem; }
        textarea { width: 100%; padding: 8px; background: #e0e0e0; border: none; margin-bottom: 14px; font-size: 1rem; resize: vertical; }
        .btn-row { display: flex; gap: 12px; margin-top: 8px; }
        .btn-gold { background: #E5A823; color: white; border: none; padding: 12px 32px; font-size: 1rem; cursor: pointer; flex: 1; }
        .footer { background: #C8C8C8; padding: 16px 24px; display: flex; gap: 16px; }
        .btn-footer { background: #C0C0C0; border: none; padding: 10px 24px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SJSU Tutoring System</h1>
    </div>
    <div class="main">
        <h2>Book Appointment</h2>
        <div class="cards">
            <div class="card">
                <h3>Tutor's Information</h3>
                <p>Tutor: <span th:text="${slot.tutorName}"></span></p>
                <p>Subject: <span th:text="${slot.subject}"></span></p>
                <p>Date: <span th:text="${slot.date}"></span></p>
                <p>Time: <span th:text="${slot.time}"></span></p>
                <p>Duration: <span th:text="${slot.durationMinutes} + ' minutes'"></span></p>
            </div>
            <div class="card">
                <h3>Student Booking Information</h3>
                <form th:action="@{/book}" method="post">
                    <input type="hidden" name="slotId" th:value="${slot.slotId}" />
                    <label for="studentName">Student Name:</label>
                    <input type="text" id="studentName" name="studentName" required />
                    <label for="studentId">Student ID:</label>
                    <input type="text" id="studentId" name="studentId" required />
                    <label for="studentEmail">Email:</label>
                    <input type="text" id="studentEmail" name="studentEmail" placeholder="e.g. your.name@sjsu.edu" required />
                    <label for="notes">Notes:</label>
                    <textarea id="notes" name="notes" rows="2"></textarea>
                    <div class="btn-row">
                        <a href="/slots"><button type="button" class="btn-gold">Cancel</button></a>
                        <button type="submit" class="btn-gold">Confirm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="footer">
        <button class="btn-footer">Contact</button>
        <button class="btn-footer">About</button>
    </div>
</body>
</html>
