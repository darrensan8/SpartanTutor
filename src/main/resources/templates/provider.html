<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provider - Manage Slots</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: white; }
        .header h1 { font-size: 1.5rem; font-weight: normal; }
        .main { background: #707070; min-height: 80vh; padding: 32px; }
        .main h2 { color: #E5A823; font-size: 1.5rem; margin-bottom: 24px; font-weight: bold; }
        .main h3 { color: white; font-size: 1.1rem; margin-bottom: 12px; margin-top: 24px; }
        .card { background: white; padding: 24px; margin-bottom: 24px; }
        .form-card { background: white; padding: 24px; max-width: 500px; margin-bottom: 24px; }
        label { display: block; margin-bottom: 4px; font-size: 0.95rem; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; background: #e0e0e0; border: none; margin-bottom: 14px; font-size: 1rem; }
        .btn-gold { background: #E5A823; color: white; border: none; padding: 12px 32px; font-size: 1rem; cursor: pointer; width: 100%; }
        .btn-home { background: #0055A2; color: white; text-decoration: none; padding: 10px 20px;
            display: inline-block; margin-bottom: 20px; font-size: 0.95rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 16px; font-size: 1rem; font-weight: normal; border-bottom: 1px solid #ccc; }
        td { padding: 12px 16px; border-bottom: 1px solid #eee; }
        .btn-delete { background: #c0392b; color: white; border: none; padding: 6px 14px; cursor: pointer; }
        .status-available { color: green; font-weight: bold; }
        .status-booked { color: #c0392b; font-weight: bold; }
        .footer { background: #C8C8C8; padding: 16px 24px; display: flex; gap: 16px; }
        .btn-footer { background: #C0C0C0; border: none; padding: 10px 24px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
<div class="header">
    <h1>SJSU Tutoring System</h1>
</div>
<div class="main">
    <h2>Provider - Manage Availability</h2>
    <a href="/" class="btn-home">&#8592; Back to Home</a>

    <!-- Add New Slot -->
    <h3>Add New Time Slot</h3>
    <div class="form-card">
        <form th:action="@{/provider/add}" method="post">
            <label for="tutorName">Tutor Name:</label>
            <input type="text" id="tutorName" name="tutorName" placeholder="e.g. Jane Doe" required />

            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" placeholder="e.g. CS146" required />

            <label for="date">Date:</label>
            <input type="text" id="date" name="date" placeholder="e.g. 05/15/26" required />

            <label for="time">Time:</label>
            <input type="text" id="time" name="time" placeholder="e.g. 3:00pm" required />

            <label for="durationMinutes">Duration (minutes):</label>
            <input type="number" id="durationMinutes" name="durationMinutes" value="45" required />

            <button type="submit" class="btn-gold">Add Slot</button>
        </form>
    </div>

    <h3>All Time Slots</h3>
    <div class="card">
        <table>
            <thead>
            <tr>
                <th>Tutor</th>
                <th>Subject</th>
                <th>Date</th>
                <th>Time</th>
                <th>Duration</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(slots)}">
                <td colspan="7">No slots available.</td>
            </tr>
            <tr th:each="slot : ${slots}">
                <td th:text="${slot.tutorName}"></td>
                <td th:text="${slot.subject}"></td>
                <td th:text="${slot.date}"></td>
                <td th:text="${slot.time}"></td>
                <td th:text="${slot.durationMinutes} + ' min'"></td>
                <td>
                            <span th:class="${slot.status == 'available'} ? 'status-available' : 'status-booked'"
                                  th:text="${slot.status}"></span>
                </td>
                <td>
                    <form th:action="@{/provider/delete/{id}(id=${slot.slotId})}" method="post">
                        <button type="submit" class="btn-delete"
                                th:disabled="${slot.status == 'booked'}"
                                th:title="${slot.status == 'booked'} ? 'Cannot delete a booked slot' : 'Delete slot'">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="footer">
    <button class="btn-footer">Contact</button>
    <button class="btn-footer">About</button>
</div>
</body>
</html>
